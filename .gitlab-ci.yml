stages:
  - validate
  - test
  - build
  - security

variables:
  PYTHONPATH: "."
  DEBUG: "false"
  DATABASE_URL: "sqlite:///:memory:"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/
    - .npm/

backend_compile_import:
  stage: validate
  image: python:3.11-slim
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - python -m compileall backend
    - python -c "import sys; sys.path.insert(0, '.'); from backend.main import app; print('APP_IMPORT_OK')"

docker_compose_config:
  stage: validate
  image: docker:27-cli
  script:
    - docker compose version
    - docker compose -f docker-compose.yml config

backend_tests:
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: "user"
    POSTGRES_PASSWORD: "password"
    POSTGRES_DB: "scfca"
    DATABASE_URL: "postgresql://user:password@postgres:5432/scfca"
    PYTHONPATH: "."
    DEBUG: "false"
  script:
    - apt-get update && apt-get install -y --no-install-recommends postgresql-client
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - pip install pytest httpx
    - until pg_isready -h postgres -U user -d scfca; do sleep 1; done
    - python scripts/seed_demo_data.py
    - pytest -q --junitxml=pytest-report.xml
  artifacts:
    when: always
    reports:
      junit: pytest-report.xml
    paths:
      - pytest-report.xml
    expire_in: 1 week

frontend_build:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    when: on_success
    paths:
      - frontend/dist/
    expire_in: 1 week

backend_dependency_audit:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  script:
    - python -m pip install --upgrade pip
    - pip install pip-audit
    - pip-audit -r backend/requirements.txt -f json -o pip-audit-report.json
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
    expire_in: 1 week

frontend_dependency_audit:
  stage: security
  image: node:20
  allow_failure: true
  script:
    - cd frontend
    - npm ci
    - npm audit --json > npm-audit-frontend.json
  artifacts:
    when: always
    paths:
      - frontend/npm-audit-frontend.json
    expire_in: 1 week

backend_sast_bandit:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  script:
    - python -m pip install --upgrade pip
    - pip install bandit
    - bandit -r backend -f json -o bandit-backend-report.json
  artifacts:
    when: always
    paths:
      - bandit-backend-report.json
    expire_in: 1 week

semgrep_sast:
  stage: security
  image: semgrep/semgrep:latest
  allow_failure: true
  script:
    - semgrep scan --config auto --json --output semgrep-report.json
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 1 week

secret_scan_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  allow_failure: true
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --no-git
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 1 week

container_scan_backend_trivy:
  stage: security
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  allow_failure: true
  script:
    - docker build -t scfca-backend-ci:latest -f backend/Dockerfile .
    - docker run --rm -v "$PWD:/workspace" aquasec/trivy:latest image --format json --output /workspace/trivy-backend-report.json scfca-backend-ci:latest
  artifacts:
    when: always
    paths:
      - trivy-backend-report.json
    expire_in: 1 week

container_scan_frontend_trivy:
  stage: security
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  allow_failure: true
  script:
    - docker build -t scfca-frontend-ci:latest -f frontend/Dockerfile frontend
    - docker run --rm -v "$PWD:/workspace" aquasec/trivy:latest image --format json --output /workspace/trivy-frontend-report.json scfca-frontend-ci:latest
  artifacts:
    when: always
    paths:
      - trivy-frontend-report.json
    expire_in: 1 week

iac_scan_checkov:
  stage: security
  image:
    name: bridgecrew/checkov:latest
    entrypoint: [""]
  allow_failure: true
  script:
    - checkov -d . --framework dockerfile,docker_compose,gitlab_ci --output json --output-file-path checkov-report.json
  artifacts:
    when: always
    paths:
      - checkov-report.json
    expire_in: 1 week
