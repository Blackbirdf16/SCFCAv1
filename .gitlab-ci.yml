stages:
  - validate
  - test
  - build
  - security

variables:
  PYTHONPATH: "."
  DEBUG: "false"
  DATABASE_URL: "sqlite:///:memory:"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/
    - .npm/

backend_compile_import:
  stage: validate
  image: python:3.11-slim
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - python -m compileall backend
    - python -c "import sys; sys.path.insert(0, '.'); from backend.main import app; print('APP_IMPORT_OK')"

docker_compose_config:
  stage: validate
  image: docker:27-cli
  script:
    - docker compose version
    - docker compose -f docker-compose.yml config

backend_tests:
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: "user"
    POSTGRES_PASSWORD: "password"
    POSTGRES_DB: "scfca"
    DATABASE_URL: "postgresql://user:password@postgres:5432/scfca"
    PYTHONPATH: "."
    DEBUG: "false"
  script:
    - apt-get update && apt-get install -y --no-install-recommends postgresql-client
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - pip install pytest httpx
    - until pg_isready -h postgres -U user -d scfca; do sleep 1; done
    - python scripts/seed_demo_data.py
    - pytest -q --junitxml=pytest-report.xml
  artifacts:
    when: always
    reports:
      junit: pytest-report.xml
    paths:
      - pytest-report.xml
    expire_in: 1 week

frontend_build:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    when: on_success
    paths:
      - frontend/dist/
    expire_in: 1 week

backend_dependency_audit:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  script:
    - python -m pip install --upgrade pip
    - pip install pip-audit
    - |
      set +e
      pip-audit -r backend/requirements.txt -f json -o pip-audit-report.json
      scan_exit=$?
      set -e
      python3 scripts/security_reports_to_html.py --input pip-audit-report.json --output pip-audit-report.html --title "Backend pip-audit SCA Report" --tool pip-audit
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
      - pip-audit-report.html
    expire_in: 1 week

frontend_dependency_audit:
  stage: security
  image: node:20
  allow_failure: true
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends python3
    - cd frontend
    - npm ci
    - |
      set +e
      npm audit --json > npm-audit-frontend.json
      scan_exit=$?
      set -e
      cd ..
      python3 scripts/security_reports_to_html.py --input frontend/npm-audit-frontend.json --output frontend/npm-audit-frontend.html --title "Frontend npm audit SCA Report" --tool npm-audit
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - frontend/npm-audit-frontend.json
      - frontend/npm-audit-frontend.html
    expire_in: 1 week

backend_sast_bandit:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  script:
    - python -m pip install --upgrade pip
    - pip install bandit
    - |
      set +e
      bandit -r backend -f json -o bandit-backend-report.json
      scan_exit=$?
      set -e
      python3 scripts/security_reports_to_html.py --input bandit-backend-report.json --output bandit-backend-report.html --title "Backend Bandit SAST Report" --tool bandit
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - bandit-backend-report.json
      - bandit-backend-report.html
    expire_in: 1 week

semgrep_sast:
  stage: security
  image: semgrep/semgrep:latest
  allow_failure: true
  script:
    - |
      set +e
      semgrep scan --config p/default --json --output semgrep-report.json .
      scan_exit=$?
      set -e
      python3 scripts/security_reports_to_html.py --input semgrep-report.json --output semgrep-report.html --title "Semgrep SAST Report" --tool semgrep
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - semgrep-report.json
      - semgrep-report.html
    expire_in: 1 week

secret_scan_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  allow_failure: true
  script:
    - apk add --no-cache python3
    - |
      set +e
      gitleaks detect --source . --report-format json --report-path gitleaks-report.json --no-git
      scan_exit=$?
      set -e
      python3 scripts/security_reports_to_html.py --input gitleaks-report.json --output gitleaks-report.html --title "Gitleaks Secret Scan Report" --tool gitleaks
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
      - gitleaks-report.html
    expire_in: 1 week

container_scan_backend_trivy:
  stage: security
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  allow_failure: true
  script:
    - apk add --no-cache curl tar gzip ca-certificates python3
    - TRIVY_VERSION="0.70.0"
    - curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o trivy.tar.gz
    - tar -xzf trivy.tar.gz trivy
    - mv trivy /usr/local/bin/trivy
    - trivy --version
    - docker build -t scfca-backend-ci:latest -f backend/Dockerfile .
    - |
      set +e
      trivy image --scanners vuln --format json --output trivy-backend-report.json scfca-backend-ci:latest
      scan_exit=$?
      set -e
      python3 scripts/security_reports_to_html.py --input trivy-backend-report.json --output trivy-backend-report.html --title "Backend Trivy Container Scan Report" --tool trivy
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - trivy-backend-report.json
      - trivy-backend-report.html
    expire_in: 1 week

container_scan_frontend_trivy:
  stage: security
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  allow_failure: true
  script:
    - apk add --no-cache curl tar gzip ca-certificates python3
    - TRIVY_VERSION="0.70.0"
    - curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o trivy.tar.gz
    - tar -xzf trivy.tar.gz trivy
    - mv trivy /usr/local/bin/trivy
    - trivy --version
    - docker build -t scfca-frontend-ci:latest -f frontend/Dockerfile frontend
    - |
      set +e
      trivy image --scanners vuln --format json --output trivy-frontend-report.json scfca-frontend-ci:latest
      scan_exit=$?
      set -e
      python3 scripts/security_reports_to_html.py --input trivy-frontend-report.json --output trivy-frontend-report.html --title "Frontend Trivy Container Scan Report" --tool trivy
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - trivy-frontend-report.json
      - trivy-frontend-report.html
    expire_in: 1 week

iac_scan_checkov:
  stage: security
  image:
    name: bridgecrew/checkov:latest
    entrypoint: [""]
  allow_failure: true
  script:
    - |
      set +e
      checkov -d . --framework dockerfile yaml gitlab_ci --output json --output-file-path checkov-report.json
      scan_exit=$?
      set -e
      python3 scripts/security_reports_to_html.py --input checkov-report.json --output checkov-report.html --title "Checkov IaC Security Report" --tool checkov
      exit $scan_exit
  artifacts:
    when: always
    paths:
      - checkov-report.json
      - checkov-report.html
    expire_in: 1 week

dast_zap_baseline:
  stage: security
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    COMPOSE_PROJECT_NAME: "ci"
    DAST_TARGET_URL: "http://localhost:5173"
  allow_failure: true
  script:
    - apk add --no-cache curl
    - docker compose version
    - docker compose up -d --build
    - |
      echo "Waiting for backend health endpoint..."
      i=0
      until docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" curlimages/curl:8.7.1 -sf http://backend:8000/api/v1/health/ > /dev/null; do
        i=$((i+1))
        if [ "$i" -ge 60 ]; then
          echo "Backend did not become healthy in time"
          docker compose ps
          exit 1
        fi
        sleep 2
      done
    - |
      echo "Waiting for frontend..."
      i=0
      until docker run --rm --network host curlimages/curl:8.7.1 -sf "${DAST_TARGET_URL}/" > /dev/null; do
        i=$((i+1))
        if [ "$i" -ge 60 ]; then
          echo "Frontend did not become reachable in time"
          docker compose ps
          docker compose logs frontend --tail=80
          docker compose logs backend --tail=80
          exit 1
        fi
        sleep 2
      done
    - docker run --rm --network host -v "$PWD:/zap/wrk/:rw" -w /zap/wrk ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t "${DAST_TARGET_URL}" -J zap-baseline-report.json -r zap-baseline-report.html -w zap-baseline-report.md -I
  artifacts:
    when: always
    paths:
      - zap-baseline-report.json
      - zap-baseline-report.html
      - zap-baseline-report.md
    expire_in: 1 week
  after_script:
    - docker compose down -v || true
