stages:
  - validate
  - test
  - build
  - security

variables:
  PYTHONPATH: "."
  DEBUG: "false"
  DATABASE_URL: "sqlite:///:memory:"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/
    - .npm/

backend_compile_import:
  stage: validate
  image: python:3.11-slim
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - python -m compileall backend
    - python -c "import sys; sys.path.insert(0, '.'); from backend.main import app; print('APP_IMPORT_OK')"

docker_compose_config:
  stage: validate
  image: docker:27-cli
  script:
    - docker compose version
    - docker compose -f docker-compose.yml config

backend_tests:
  stage: test
  image: python:3.11-slim
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - pip install pytest httpx
    - pytest -q --junitxml=pytest-report.xml
  artifacts:
    when: always
    reports:
      junit: pytest-report.xml
    paths:
      - pytest-report.xml
    expire_in: 1 week

frontend_build:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    when: on_success
    paths:
      - frontend/dist/
    expire_in: 1 week

backend_dependency_audit:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  script:
    - python -m pip install --upgrade pip
    - pip install pip-audit
    - pip-audit -r backend/requirements.txt -f json -o pip-audit-report.json
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
    expire_in: 1 week

frontend_dependency_audit:
  stage: security
  image: node:20
  allow_failure: true
  script:
    - cd frontend
    - npm ci
    - npm audit --json > npm-audit-frontend.json
  artifacts:
    when: always
    paths:
      - frontend/npm-audit-frontend.json
    expire_in: 1 week

backend_sast_bandit:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  script:
    - python -m pip install --upgrade pip
    - pip install bandit
    - bandit -r backend -f json -o bandit-backend-report.json
  artifacts:
    when: always
    paths:
      - bandit-backend-report.json
    expire_in: 1 week

semgrep_sast:
  stage: security
  image: semgrep/semgrep:latest
  allow_failure: true
  script:
    - semgrep scan --config auto --json --output semgrep-report.json
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 1 week

secret_scan_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  allow_failure: true
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --no-git
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 1 week
